<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2><u>Submitted Information:</u></h2>

    <p>Name: {{ name }}</p>
    <p>Dojo Location: {{ location }}</p>
    <p>Favorite Language: {{ language }}</p>
    <p>Comment: {{ comment }}</p>

    <p>Gender: {{ gender }}</p>
    <p>Skills:
        {% for skill in skills %}
            {{ skill }}
        {% endfor %}
    </p>

    <a href="/back" class="row right">
        <button>Go Back</button>
    </a>
</div>

</body>
</html>
