<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new_show</title>
</head>
<body>
   <h1>Add a New Show</h1>

{% for message in messages %}
<p style="color:red">{{ message }}</p>
{% endfor %}

<form action="/shows/create" method="POST">
    {% csrf_token %}

    Title: <input type="text" name="title"><br>

    Network: <input type="text" name="network"><br>

    Release Date: <input type="date" name="release_date"><br>

    Description (optional): <textarea name="description"></textarea><br>

    <button type="submit">Create</button>
</form>
</body>
</html>
