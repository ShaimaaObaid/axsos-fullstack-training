<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>all_shows</title>
</head>
<body>
    <h1>All Shows</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Network</th>
        <th>Release Date</th>
        <th>Actions</th>
    </tr>

    {% for show in all_shows %}
    <tr>
        <td>{{show.id}}</td>
        <td>{{show.title}}</td>
        <td>{{show.network}}</td>
        <td>{{show.release_date}}</td>

        <td>
            <a href="/shows/{{show.id}}">Show</a>
            |
            <a href="/shows/{{show.id}}/edit">Edit</a>
            |

            <form action="/shows/{{show.id}}/destroy" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Delete</button>
            </form>

        </td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="/shows/new">Add a New Show</a>

</body>
</html>
