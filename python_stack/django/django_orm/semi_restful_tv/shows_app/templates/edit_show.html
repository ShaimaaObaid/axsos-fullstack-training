<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>edit_show</title>
</head>
<body>
    <a href="/shows">Go Back</a>

<h1>Edit Show {{show.id}}</h1>

{% if messages %}
    {% for message in messages %}
        <p style="color:red">{{message}}</p>
    {% endfor %}
{% endif %}

<form action="/shows/{{show.id}}/update" method="post">
    {% csrf_token %}

    <p>
        Title:
        <input type="text" name="title" value="{{show.title}}">
    </p>

    <p>
        Network:
        <input type="text" name="network" value="{{show.network}}">
    </p>

    <p>
        Release Date:
        <input
            type="date"
            name="release_date"
            value="{{show.release_date|date:'Y-m-d'}}"
        >
    </p>

    <p>
        Description:
        <textarea name="description">{{show.description}}</textarea>
    </p>

    <button>Update</button>

</form>

<br>

<a href="/shows/{{show.id}}">
    Go To Show
</a>
</body>
</html>
