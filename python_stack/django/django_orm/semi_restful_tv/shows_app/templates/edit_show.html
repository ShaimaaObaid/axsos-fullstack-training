<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>edit_show</title>
</head>
<body>
<h1>Edit Show</h1>

{% for message in messages %}
<p style="color:red">{{ message }}</p>
{% endfor %}

<form action="/shows/{{ show.id }}/update" method="POST">
    {% csrf_token %}

    Title: <input type="text" name="title" value="{{ show.title }}"><br>

    Network: <input type="text" name="network" value="{{ show.network }}"><br>

    Release Date: <input type="date" name="release_date" value="{{ show.release_date|date:'Y-m-d' }}"><br>

    Description: <textarea name="description">{{ show.description }}</textarea><br>

    <button type="submit">Update</button>
</form>
</body>
</html>
