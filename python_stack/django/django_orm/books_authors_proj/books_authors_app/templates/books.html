<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
</head>
<body>
    <h1>Add a Book</h1>

<form action="/books/add/" method="POST">
    {% csrf_token %}

    <p>Title</p>
    <input type="text" name="title">

    <p>Description</p>
    <textarea name="desc"></textarea>

    <button>Add</button>
</form>

<hr>

<h2>All Books</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Action</th>
    </tr>

    {% for book in all_books %}
    <tr>
        <td>{{ book.id }}</td>
        <td>{{ book.title }}</td>
        <td><a href="/books/{{ book.id }}/">View</a></td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
