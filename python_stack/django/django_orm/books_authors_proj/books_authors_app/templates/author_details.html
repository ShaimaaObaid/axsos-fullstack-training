<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author details</title>
</head>
<body>
    <h1>{{ author.first_name }} {{ author.last_name }}</h1>

<p>ID: {{ author.id }}</p>
<p>{{ author.notes }}</p>

<hr>

<h3>Books linked</h3>
<ul>
    {% for book in books %}
        <li>{{ book.title }}</li>
    {% empty %}
        <li>No books yet</li>
    {% endfor %}
</ul>

<hr>

<h3>Add Book</h3>

<form action="/authors/{{ author.id }}/add_book/" method="POST">
    {% csrf_token %}

    <select name="book">
        {% for book in available_books %}
            <option value="{{ book.id }}">
                {{ book.title }}
            </option>
        {% empty %}
            <option disabled>No available books</option>
        {% endfor %}
    </select>

    <button>Add</button>
</form>
</body>
</html>
