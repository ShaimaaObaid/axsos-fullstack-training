<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
</head>
<body>
    <center>  
  <h1>Counter</h1>

    <h2>{{ counter }}</h2>
    <p>{{ visits }} visites</p>

    <form action="/add_two" method="post">
        {% csrf_token %}
        <button type="submit">+2</button>
    </form>

    <br>

    <form action="/set_increment" method="post">
        {% csrf_token %}
        <input type="number" name="increment" placeholder="enter value">
        <button type="submit">Add</button>
    </form>

    <br>

    <form action="/destroy_session" method="post">
        {% csrf_token %}
        <button type="submit">Reset</button>
    </form>
    </center>
    
</body>
</html>
